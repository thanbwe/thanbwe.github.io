<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/styles.css">
    <title>Login</title>
</head>
<body style="background-color: #9e9595;">
    <div class="register">
        <form action="">
            <h2>Register Form</h2>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Enter Your Name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter Your Email">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="number" name="phone" id="phone" placeholder="Enter Your Phone">
            </div>
            <div class="form-group">
                <label for="password1">Password</label>
                <input type="password" name="password1" id="password1" placeholder="Enter Your Password">
            </div>
            <div class="form-group">
                <label for="password1">Confirm_Password</label>
                <input type="password" name="password1" id="password1" placeholder="Enter Your Confirm_Password">
            </div>
            <div class="login-btn">
                <input type="submit" value="Register">
                <span><a href="../index.html">Cancle</a></span>
                <p><i>If you have already account.</i><a href="./login.html"> Login Here...</a></p>
            </div>
        </form>
    </div>
</body>
</html>
