<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animate</title>
    <script src="jquery-3.7.1.min.js"></script>
    <style>
        #panel {
            max-width: 150px;
            padding: 50px;
            text-align: center;
            background-color: red;
            color: white;
            position: relative;
        }
    </style>
</head>

<body>
    <p id="panel">Animate</p>
    <button id="start">Start</button>

    <script>
        $(document).ready(function () {

            $('#start').click(function () {

                $("#panel").animate({ left: "350px" }, 500)
                    .animate({ top: "350px" }, 500)
                    .animate({ left: "0px", right:'350px' }, 500)
                    .animate({ top: "0px", bottom:'350px' }, 500);


            })
        })
    </script>
</body>

</html>
