<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add css</title>
    <script src="jquery-3.7.1.min.js"></script>
</head>
<body>
    <p id="day">To Day is Tuseday.</p>
    <button id="add-css">Add CSS</button>

    <script>
        $(document).ready(function() {

            $('#add-css').click(function() {
                $('#day').css({'color':'red','background-color':'black'});
            })
        })
    </script>
</body>
</html>
