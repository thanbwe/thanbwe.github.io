<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        .inline {
            border: 1px solid #000;
            width: 300px;
            display: inline-block;
        }
        .block {
            border: 1px solid #000;
            width: 300px;
            display: inline-block; 
        }
    </style>
</head>
<body>
    <h1>Inline Layout</h1>
    <a class="inline" href="">Google</a>
    <a class="inline" href="">Facebook</a>
    <a class="inline" href="">Twinter</a>
    <a class="inline" href="">Telegram</a>

    <h1>Block Layout</h1>
    <div class="block">Hello World</div>
    <p class="block">I love CSS</p>
</body>
</html>
