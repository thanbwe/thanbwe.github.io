<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Grid Lesson</h1>
    <div class="gridOne">
        <div style="background-color:  red;;">1</div>
        <div style="background-color: yellow;">2</div>
        <div style="background-color: green;">3</div>
        <div style="background-color: black;">4</div>
        <div style="background-color: blue;">5</div>
        <div style="background-color: gray;">6</div>
        <div style="background-color: orange;">7</div>
        <div style="background-color: pink;">8</div>
        <div style="background-color: purple;">9</div>
    </div>

    <h1>Grid Column</h1>
    <div class="gridTwo">
        <div style="background-color:  red;;">1</div>
        <div style="background-color: yellow;">2</div>
        <div style="background-color: green;">3</div>
        <div style="background-color: black;">4</div>
        <div style="background-color: blue;">5</div>
        <div style="background-color: gray;">6</div>
        <div style="background-color: orange;">7</div>
        <div style="background-color: pink;">8</div>
        <div style="background-color: purple;">9</div>
    </div>

    <h1>Grid Row</h1>
    <div class="gridThree">
        <div style="background-color:  red;;">1</div>
        <div style="background-color: yellow;">2</div>
        <div style="background-color: green;">3</div>
        <div style="background-color: black;">4</div>
        <div style="background-color: blue;">5</div>
        <div style="background-color: gray;">6</div>
        <div style="background-color: orange;">7</div>
        <div style="background-color: pink;">8</div>
        <div style="background-color: purple;">9</div>
    </div>

    <h1>Grid Gap</h1>
    <div class="gridFour">
        <div style="background-color:  red;;">1</div>
        <div style="background-color: yellow;">2</div>
        <div style="background-color: green;">3</div>
        <div style="background-color: black;">4</div>
        <div style="background-color: blue;">5</div>
        <div style="background-color: gray;">6</div>
        <div style="background-color: orange;">7</div>
        <div style="background-color: pink;">8</div>
        <div style="background-color: purple;">9</div>
    </div>

    <h1>Grid Column Gap</h1>
    <div class="gridFive">
        <div style="background-color:  red;;">1</div>
        <div style="background-color: yellow;">2</div>
        <div style="background-color: green;">3</div>
        <div style="background-color: black;" class="coladd">4</div>
        <div style="background-color: blue;">5</div>
        <div style="background-color: gray;">6</div>
        <div style="background-color: orange;">7</div>
        <div style="background-color: pink;">8</div>
        <div style="background-color: purple;">9</div>
    </div>

    <h1>Grid Row Gap</h1>
    <div class="gridSix">
        <div style="background-color:  red;;">1</div>
        <div style="background-color: yellow;">2</div>
        <div style="background-color: green;">3</div>
        <div style="background-color: black;" class="rowadd">4</div>
        <div style="background-color: blue;">5</div>
        <div style="background-color: gray;">6</div>
        <div style="background-color: orange;">7</div>
        <div style="background-color: pink;">8</div>
        <div style="background-color: purple;">9</div>
    </div>
</body>
</html>
