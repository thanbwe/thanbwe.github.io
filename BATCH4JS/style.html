<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style</title>
</head>
<body>
    <h1>Style Property</h1>
    <h2 id="myh2">Css style Effect with Js</h2>
    <button onclick="changeEffect()">CSS Design</button>


    <script>
        // document.getElementById('myh2').style.color = "red";
        // console.log();
        function changeEffect() {
            let h2 = document.getElementById('myh2');
            h2.style.color = "red";
            h2.style.backgroundColor = "green";
            h2.style.padding = "50px";
            h2.style.textTransform = "upperCase";
            
        }
    </script>
</body>
</html>
