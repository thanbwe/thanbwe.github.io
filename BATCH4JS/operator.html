<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator</title>
</head>
<body>
    <h1>Operator</h1>
    <ol>
        <li>Assign Operator</li>
        <li>Addition +</li>
        <li>Subtraction -</li>
        <li>Division /</li>
        <li>Remainder %</li>
        <li>Multiplication *</li>
        <li>Exponentiation **</li>
        <li>Precedence
            <ol>
                <li> [] </li>
                <li> *   /    %  </li>
                <li>  +   - </li>
                <li> = </li>
            </ol>
        </li>
    </ol>

    <hr>

    <script>
        // Assign 
        let name = 'Kyaw Zin Aung';
        console.log(name);

        // Addition
        let sumResult = 23453 + 24121;
        console.log(sumResult);

        let num1 = 5;
        let num2 = 15;
        let result = num1 + num2;
        console.log(result);

        let no = 4;
        no += 6;
        console.log(no);

        let number = 7;
        console.log(number++);
        console.log(++number);

        // Subtraction
        let subnum = 5 - 2;
        console.log(subnum);
        
        let subnumber = 7;
        console.log(subnumber--);
        
        // division
        console.log(8/2);
        
        // Multiplication
        console.log(5 * 10);
        
        // Exponentiation
        console.log( 4 ** 3 );

        // Remainder
        console.log(2.5 % 2);
        
        
        // Precedence 
        let a = 1 * 2 + 5 / 2 % 2;
                // 2 + 2.5 % 2

        console.log(a);
        
    </script>
</body>
</html>
