<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator</title>
</head>
<body>
    <h1>Operator Lessons</h1>

    <script>
        // Assign Operator
        let name = "Kyaw Zin Aung";
        console.log(name);

        // Additional Operator 
        let sumResult = 123 + 559;
        console.log (sumResult);

        let num1 = 3;
        let num2 = 2;
        let sum = num1 + num2;
        console.log(sum);

        let no = 1;
        no += 3;
        console.log(no);

        let num = 7;
        console.log(++num);

        let num3 = 7;
        console.log(num3++);
        console.log(num3);

        // sub 
        let sub = 5 - 2;
        console.log(sub);

        let subNumber = 7;
        subNumber -= 5;
        console.log(subNumber);


        
    </script>
</body>
</html>
