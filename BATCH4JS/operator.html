<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator</title>
</head>
<body>
    <h1>Operator Lessons</h1>

    <script>
        // Assign Operator
        let name = "Kyaw Zin Aung";
        console.log(name);

        // Additional Operator 
        let sumResult = 123 + 559;
        console.log (sumResult);

        let num1 = 3;
        let num2 = 2;
        let sum = num1 + num2;
        console.log(sum);

        let no = 1;
        no += 3;
        console.log(no);

        let num = 7;
        console.log(++num);

        let num3 = 7;
        console.log(num3++);
        console.log(num3);

        // sub 
        let sub = 5 - 2;
        console.log(sub);

        let subNumber = 7;
        subNumber -= 5;
        console.log(subNumber);

        // Division Operator
        let div1 = 10 / 2;
        console.log(div1);

        let div2 = 20;
        div2 /= 3;
        console.log(div2);

        // Remainder Operator
        let rem1 = 20 % 3;
        console.log(rem1);

        let rem2 = 234533245433555;
        rem2 %= 234;
        console.log(rem2);

        // Multiplication
        let multi = 2345 * 3553;
        console.log(multi);

        // Exponentation
        let expo = 2 ** 6;
        console.log(expo);

        // Precendence 
        let total = 2 * (2 + 5) / 2 % 2 -5;
        console.log(total);

        
    </script>
</body>
</html>
