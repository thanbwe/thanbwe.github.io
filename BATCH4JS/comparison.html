<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>comparison</title>
</head>

<body>
    <h1>Conparisons</h1>
    <p>
        - < “less than” <br>
        - <=“less than or equal” <br>
        - > “greater than” <br>
        - >= “greater than or equal” <br>
        - == “equality value” <br>
        - === “equality value and data type” <br>
        - != “not equality value” <br>
        - !== “not equality value and data type” <br>
    </p>
    <hr>

    <script>
        // 
        let num1 = 12;
        let num2 = 10;
        if (num1 > num2) {
            document.write('It is Okay.');
        }

        console.log(num1 === num2);
        
    </script>
</body>

</html>
