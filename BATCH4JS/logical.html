<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>logical</title>
</head>
<body>
    <h1>Logical Operator</h1>
    <ol>
        <li>And && နှစ်ခုလုံးမှန်ရင် true</li>
        <li>Or  || နှစ်ခုလုံးမှန်ရင် true, နှစ်ခု တစ်ခုတစ်ခုမှန်ရင် true</li>
        <li>Not ! true ဆိုရင် false, false ဆိုရင် true</li>
    </ol>

    <hr>

    <script>
        // and &&
        console.log( 4 > 3 && 2 < 5);

        // or ||
        console.log(4 > 3 || 2 > 5);
        
        
    </script>
</body>
</html>
