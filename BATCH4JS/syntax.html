<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax</title>
</head>

<body>
    <h1>Syntax</h1>
    <script>
        //Syantax
        var name = 'Kyaw Zin Aung'; // String
        console.log(name);
        // show type
        console.log(typeof(name));

        var num = 1 + 2; // Number
        console.log(num);

        var name = true; // Boolen
        console.log(name);

        var age; // Underfined
        console.log(age);

        var color = null; // Null 
        console.log(color);
        
        
        
    </script>
</body>

</html>
