<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property And Method</title>
</head>
<body>
    <h1>Property And Method</h1>

    <p id="removeAtt" style="color: red;">This is Remove Attribute.</p>

    <p id="setAtt">This is Set Attribute.</p>
    
    <p id="getAtt" style="color: green;" class="CreateGetAttribute">This is Get Attribute.</p>

    <button onclick="createElementLesson()">createElement</button>
    <button onclick="createSetAtt()">CreateSetAttribute</button>
    <button onclick="createGetAtt()">CreateGetAttribute</button>
    <button onclick="remove()">ChangeColor</button>

    <script>
        function createElementLesson() {
            // alert("Ok");
            let h3 = document.createElement('h3');
            // console.log(h3);
            h3.innerText = "This is h3 Element";
            // console.log(h3);
            document.body.appendChild(h3);
        }

        function createSetAtt() {
            let setAttElement = document.getElementById("setAtt");
            setAttElement.setAttribute('style', 'color: red');
        }

        function createGetAtt () {
            let getAttElement = document.getElementById('getAtt');
            console.log(getAttElement.getAttribute('style'));
        } 

        function remove() {
            let removeTag = document.getElementById('removeAtt');
            // console.log(removeTag);

            let setcolor = removeTag.getAttribute('style');
            // console.log(setcolor);

            if (setcolor == 'color: red') {
                removeTag.removeAttribute('style');
                removeTag.setAttribute('style', 'color: green');
            }else {
                removeTag.removeAttribute('style');
                removeTag.setAttribute('style', 'color: red');
            }
        }

    </script>
</body>
</html>
