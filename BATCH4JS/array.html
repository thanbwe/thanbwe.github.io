<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
</head>
<body>
    <h1>Array Lessons</h1>

    <script>
        function lineBreak() {
            document.write(`<br>`);
        }
        // see array class
        let arr = ['a', 'b', 'c'];
        document.write(arr.length); // Number of array length
        lineBreak();

        let fruits = ['Apple', 'Orange', 'Mango', 'Strawberry'];
        document.write(fruits.length);
        lineBreak();

        //Array နောက်ဆုံးခန်းကနေထည့်တာ push
        fruits.push('Banana');
        console.log(fruits);
        //ဖြတ်တာ
        fruits.pop();
        console.log(fruits);
        

        //Array ရှေ့ရှေ့ဆုံးခန်းကနေထည့်တာ Unshift
        fruits.unshift('Banana', 'cherry');
        console.log(fruits);
        //ဖြတ်တာ
        fruits.shift();
        console.log(fruits);


        let students = ['Tun Tun', 'Aung Aung', 'Hla Hla', 'Mya Mya'];
        console.log(students);

        // Array အစဉ်လိုက်စီခြင်း
        students.sort();
        console.log(students);

        // Array ပြောင်းပြန်စီခြင်း
        students.reverse();
        console.log(students);

        // A to Z အစဉ်လိုက်စီခြင်း
        students.sort().reverse();
        console.log(students);
        

        let studentsStr = students.toString();
        console.log(studentsStr);
        

        let names = 'Aung Aung, Tun Tun, Hla Hla, Kyaw Kyaw, Mya Mya';
        let namesArray = names.split(',');
        console.log(namesArray);
        
        let arr1 = [1, 2, 3, 4];
        let arr2 = [4, 5, 6,];
        let arr3 = [7, 8, 9];

        let array = arr1.concat(arr2);
        console.log(array);

        let multiArray = [...arr1, ...arr2, ...arr3];
        console.log(multiArray);
        
        

    </script>
</body>
</html>
