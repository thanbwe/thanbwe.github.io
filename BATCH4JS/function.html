<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function</title>
</head>
<body>
    <h1>Function Lessons</h1>

    <script>
        // Return Function
        function resultData(num1, num2) {
            let result = num1 + num2;
            return result;
        }
        let resultOne = resultData(205, 100);
        console.log(resultOne);
        let resultTwo = resultData(25, 25);
        console.log(resultTwo);
    </script>
</body>
</html>
