<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home work</title>
</head>

<body>
    <h1>Home Work</h1>

    <script>
        let num = Number(prompt("Enter a Number"));

        if (num % 2 == 0) {
            document.write('Your number is even');
        } else {
            document.write('Your number is odd');
        }
    </script>
</body>

</html>
