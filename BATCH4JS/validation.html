<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <form action="register.php" onsubmit="return checkValue()">
        <label for="name">Name</label> <br>
        <input type="text" name="name" id="name"><br>
        <span id="nameError"></span> <br><br>

        <label for="email">Email</label> <br>
        <input type="email" name="email" id="email"><br>
        <span id="emailError"></span> <br><br>

        <label for="pass1">Password</label> <br>
        <input type="password" name="pass1" id="pass1"><br>
        <span id="passwordError"></span> <br><br>

        <label for="pass2">Confirm Password</label> <br>
        <input type="password" name="pass2" id="pass2"><br>
        <span id="pass1andpass2Error"></span>
        <span id="cpasswordError"></span> <br><br>

        <input type="submit" value="Register">
    </form>

    <script>
        function checkValue() {
            // alert('Okay');
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var password = document.getElementById('pass1').value;
            var cpassword = document.getElementById('pass2').value;
            

            if(name != "" && email != "" && password != "" && cpassword != ""  && password == cpassword) {
                return true;

            }else {
                var nameError = document.getElementById('name');
                var nameErrorMessage = document.getElementById('nameError');
                if (name == "") {
                nameError.style.border = '1px solid red';
                nameErrorMessage.innerText = 'Required';
                nameErrorMessage.style.color = 'red';
                }else {
                    nameError.style.border = '';
                    nameErrorMessage.innerText = '';
                }

                var emailError = document.getElementById('email');
                var emailErrorMessage = document.getElementById('emailError');
                if (email == "") {
                emailError.style.border = '1px solid red';
                emailErrorMessage.innerText = 'Required';
                emailErrorMessage.style.color = 'red';
                }else {
                    emailError.style.border = '';
                    emailErrorMessage.innerText = '';
                }

                var passwordError = document.getElementById('pass1');
                var passwordErrorMessage = document.getElementById('passwordError');
                if (password == "") {
                    passwordError.style.border = '1px solid red';
                    passwordErrorMessage.innerText = 'Required';
                    passwordErrorMessage.style.color = 'red';
                }else {
                    passwordError.style.border = '';
                    passwordErrorMessage.innerText = '';
                }

                var cpasswordError = document.getElementById('pass2');
                var cpasswordErrorMessage = document.getElementById('cpasswordError');
                if (cpassword == "") {
                    cpasswordError.style.border = '1px solid red';
                    cpasswordErrorMessage.innerText = 'Required';
                    cpasswordErrorMessage.style.color = 'red';
                }else {
                    cpasswordError.style.border = '';
                    cpasswordErrorMessage.innerText = '';
                }

                var pass1andpass2Error = document.getElementById('pass1andpass2Error');
                if (cpassword != password) {
                    pass1andpass2Error.innerText = "Password and Cpassword don't equal";
                    pass1andpass2Error.style.color = 'red';
                }else {
                    pass1andpass2Error.innerText = '';
                }
                return false;
            } 
        }
    </script>
</body>
</html>
