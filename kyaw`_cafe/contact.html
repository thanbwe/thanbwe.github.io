<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyaw Cafe</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <!-- navbar -->
    <nav class="navbar">
        <div class="brand">
            <img src="images/logo.png" alt="">
            <h2>Kyaw Cafe`</h2>
        </div>
        <div class="nav-menu">
            <ul>
                <li>
                    <a href="./index.html">Home</a>
                </li>
                <li>
                    <a href="./menu.html">Menu</a>
                </li>
                <li>
                    <a href="./about.html">About</a>
                </li>
                <li>
                    <a href="./contact.html">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Contact Us -->
    <div class="contact-us">
        <h1>Contact Us</h1>
        <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d120169.2017843007!2d96.03857655364367!3d19.742933744266296!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30c8bdc0ed83cf5b%3A0xcfc42f6474da62d0!2sKyaw%20*2AFood%20and%20Cafe*2A!5e0!3m2!1sen!2smm!4v1740645767281!5m2!1sen!2smm" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="contact">
            <div class="contact-info">
                <div class="info">
                    <span class="contact-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <span class="contact-text">
                        <h3>Location:</h3>
                        <p>5854 x 115A, Chan Myatharzi,
                            Mandalay
                        </p>
                    </span>
                </div>
                <div class="info">
                    <span class="contact-icon">
                        <i class="fa-solid fa-clock"></i>
                    </span>
                    <span class="contact-text">
                        <h3>Open Hour:</h3>
                        <p>
                            6:00 AM - 9:00 PM
                        </p>
                    </span>
                </div>
                <div class="info">
                    <span class="contact-icon">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <span class="contact-text">
                        <h3>Email:</h3>
                        <p>
                            Kyawcafe@gmail.com
                        </p>
                    </span>
                </div>
            </div>
            <div class="contact-form">
                <form action="">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" name="name" id="name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="form-group">
                        <label for="massage">Massage</label>
                        <textarea name="massage" id="massage"></textarea>
                    </div>
                    <button type="submit" class="btn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
     <footer class="footer">
        <p>

            All Right Reserved

        </p>

</html>
