<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form action="">
        <label for="name">Name</label>
        <input type="text" name="student_name" id="name" placeholder="Please Enter Your Name">
        <br><br>
        <label for="email">Email</label>
        <input type="email" name="student_email" id="email" placeholder="Please Enter Your Email">
        <br><br>
        <label for="phone">Phone</label>
        <input type="number" name="student_phone" id="phone" placeholder="09---------">
        <br><br>
        <label for="password">Password</label>
        <input type="password" name="student_password" id="password" placeholder="Enter Your Password">
        <br><br>
        <label for="file">File</label>
        <input type="file" name="student_file" id="file">
        <br><br>
        <label for="year">Years</label>
        <select name="student_year" id="year">
            <option value="">Choose Your Year</option>
            <option value="First">First year</option>
            <option value="Second">Second year</option>
            <option value="Thisd">Third year</option>
        </select>
        <br><br>
        <label for="">Gender</label>
        <br><br>
        <input type="radio" name="gender" value="Male" id="male"><label for="male">Male</label>
        <input type="radio" name="gender" value="Female" id="female"><label for="female">Female</label>
        <br><br>
        <label for="">Hobby</label>
        <br><br>
        <input type="checkbox" name="travelling" id="travelling" value="Travelling"><label for="travelling">Travelling</label>
        <input type="checkbox" name="gaming" id="gaming" value="gaming"><label for="gaming">Gaming</label>
        <input type="checkbox" name="reading" id="reading" value="reading"><label for="reading">Reading</label>
        <br><br>
        <label for="address">Address</label>
        <textarea name="student_address" id="address" rows="10" cols="50"></textarea>
        <br><br>

        <input type="text" name="" id="" required value="32"> <br><br>
        <input type="text" name="" id="" readonly value="32"><br><br>
        <input type="email" name="" id="" placeholder="example@gmail.com"><br><br>
        <input type="time" name="" id=""><br><br>
        <input type="week" name="" id=""><br><br>
        <input type="date" name="" id=""><br><br>
        <input type="datetime-local" name="" id=""><br><br>
        <input type="color" name="" id=""> <br><br>
        <input type="range" name="" id="">

        <br><br>
        <button type="submit">Save</button>
    </form>
</body>
</html>
