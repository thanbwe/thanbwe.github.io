<!DOCTYPE html>
<html lang="en">
<head>
    <title>Head tag Lesson</title> <!-- အပိတ်ပါရင် pair tag -->


    <!-- meta ဆိုတာက စာမမှန်တာ ပြင်ပေးတာ -->
    <meta charset="UTF-8"> <!-- အပိတ်မပါရင် single tag -->

    <!-- For Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Basic - Search Engine Optimizarion -->
    <meta name="description" content="Join our top-rated web development
    training school and master HTML, CSS, JavaScript, and PHP.
    Learn web development with hands-on projects, expert guidance,
    and career-focused courses. Start your journey to becoming a 
    professional web developer today!">

    <meta name="keywords" content="web development training, learn web
    development, web development school, HTML courses, CSS training, 
    JavaScript tutorials, PHP classes, beginner web development, 
    advanced web development, front-end development, back-end development, 
    responsive web design, online web development courses, web developer 
    certification, web design training, coding for beginners, career in web development">
    
    <!-- index ကို ကြည့်တာ ကျန်တာ ဝင်ကြည့်မရတာ -->
    <meta name="robots" content="index, nofollow">

    <!-- html file အတွင်းမှာ ရေးရတာကို internal -->
    <!-- internal CSS -->
    <style>
        /* selector {
            property: value;
        } */
        /* For css color h1 */
        h1 {
            color: red;
        }
        /* For css color h3 with class */
        .tag-line {
            color: white;
            background-color: black;
        }
        /* For css color h3 with id */
        #welcome {
            color: brown;
            background-color: aqua;
        }
    </style>

<!-- html file အပြင်ပြင်မှာ ရေးရတာကို External -->
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>HeinLearn</h1>
    <h3 class="tag-line">learn Everwhere.</h3>
    <h3 id="welcome">Welcome to heinLearn.</h3>

    <p>Start Web development with to Bacth-4</p>
</body>
</html>
